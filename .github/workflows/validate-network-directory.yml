name: Validate network directory

on:
  push:
    branches:
      - agent/national-network-directory

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          node --check network-directory.js
          node --check api/page.js
          node --check service-worker.js

      - name: Validate demo data
        run: node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('data/agencies-demo.json','utf8')); if(!Array.isArray(data.agencies)||data.agencies.length<5) throw new Error('Invalid agencies data'); console.log(data.agencies.length+' demo records OK');"

      - name: Validate rendered portal
        run: |
          node <<'NODE'
          const handler = require('./api/page.js');
          let statusCode = 200;
          let html = '';
          const res = {
            setHeader() {},
            status(code) { statusCode = code; return this; },
            send(value) { html = String(value); return this; }
          };
          handler({}, res);
          const checks = [
            'id="btn-red-atencion"',
            'id="menuBtnRedAtencion"',
            'id="modal-red-atencion"',
            'network-directory.css',
            'network-directory.js'
          ];
          if (statusCode !== 200) throw new Error('Portal returned '+statusCode);
          for (const check of checks) {
            if (!html.includes(check)) throw new Error('Missing rendered marker: '+check);
          }
          console.log('Rendered network directory markers OK');
          NODE
