name: Apply branding update

on:
  push:
    branches:
      - agent/update-branding-icon

permissions:
  contents: write

jobs:
  update-branding:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/update-branding-icon
          fetch-depth: 0

      - name: Install SVG renderer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin

      - name: Apply requested changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          old_text = "Consulta tus servicios, conserva tus documentos y controla el mantenimiento de tu vehículo desde un solo lugar."
          new_text = "La Asociación Cooperativa Líder de Seguros para Vehículos, R.L. es una entidad autorizada y regulada por la SUDEASEG en Venezuela para emitir pólizas de Responsabilidad Civil de Vehículos (RCV)"

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")
          if old_text not in html:
              raise SystemExit("No se encontró el texto anterior del encabezado.")
          html = html.replace(old_text, new_text, 1)

          manifest_link = '  <link rel="manifest" href="manifest.webmanifest" />'
          icon_links = (
              manifest_link + "\n"
              '  <link rel="icon" type="image/png" sizes="192x192" href="assets/app-icon-192.png" />\n'
              '  <link rel="apple-touch-icon" sizes="192x192" href="assets/app-icon-192.png" />'
          )
          if "assets/app-icon-192.png" not in html:
              html = html.replace(manifest_link, icon_links, 1)
          index_path.write_text(html, encoding="utf-8")

          svg_path = Path("assets/app-icon.svg")
          svg = svg_path.read_text(encoding="utf-8")
          svg = svg.replace('<rect width="512" height="512" rx="96" fill="#ffffff"/>', '<rect width="512" height="512" fill="#ffffff"/>')
          svg_path.write_text(svg, encoding="utf-8")

          manifest_path = Path("manifest.webmanifest")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["icons"] = [
              {
                  "src": "assets/app-icon-192.png",
                  "sizes": "192x192",
                  "type": "image/png",
                  "purpose": "any"
              },
              {
                  "src": "assets/app-icon-512.png",
                  "sizes": "512x512",
                  "type": "image/png",
                  "purpose": "any maskable"
              }
          ]
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          sw_path = Path("service-worker.js")
          sw = sw_path.read_text(encoding="utf-8")
          sw = re.sub(r"liderseguros-cache-v\d+", "liderseguros-cache-v8", sw, count=1)
          if "./assets/app-icon-192.png" not in sw:
              anchor = "  './assets/logonuevo.png',"
              replacement = anchor + "\n  './assets/app-icon.svg',\n  './assets/app-icon-192.png',\n  './assets/app-icon-512.png',"
              sw = sw.replace(anchor, replacement, 1)
          sw_path.write_text(sw, encoding="utf-8")
          PY

          rsvg-convert -w 192 -h 192 assets/app-icon.svg > assets/app-icon-192.png
          rsvg-convert -w 512 -h 512 assets/app-icon.svg > assets/app-icon-512.png

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.webmanifest service-worker.js assets/app-icon.svg assets/app-icon-192.png assets/app-icon-512.png
          git commit -m "Update hero text and PWA app icon"
          git push origin HEAD:agent/update-branding-icon
